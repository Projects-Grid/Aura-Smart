<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Aura | تسجيل الدخول</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: #050505;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* توهج الخلفية */
        .aura-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.1) 0%, transparent 70%);
            filter: blur(80px);
            z-index: 0;
        }

        .login-card {
            width: 420px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 30px;
            padding: 50px 40px;
            text-align: center;
            position: relative;
            z-index: 10;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            background: rgba(99, 102, 241, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: #6366f1;
            font-size: 30px;
            border: 1px solid rgba(99, 102, 241, 0.3);
        }

        h1 { color: white; margin-bottom: 10px; font-size: 1.8rem; }
        p { color: #64748b; margin-bottom: 35px; font-size: 0.9rem; }

        .input-group { margin-bottom: 20px; }
        
        input {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            outline: none;
            text-align: center;
            transition: 0.3s;
        }

        input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.2);
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: #6366f1;
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            text-decoration: none;
            display: block;
            margin-top: 10px;
            transition: 0.3s;
        }

        .login-btn:hover {
            background: #4f46e5;
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.4);
            transform: translateY(-2px);
        }

        .links { margin-top: 25px; font-size: 0.8rem; }
        .links a { color: #6366f1; text-decoration: none; margin: 0 10px; }
    </style>
</head>
<body>

    <div class="aura-glow"></div>

    <div class="login-card">
        <div class="icon-circle"><i class="fas fa-lock"></i></div>
        <h1>دخول النظام</h1>
        <p>الرجاء إدخال بياناتك للوصول إلى أورا</p>

        <div class="input-group">
            <input type="text" placeholder="اسم المستخدم">
        </div>
        <div class="input-group">
            <input type="password" placeholder="كلمة المرور">
        </div>

        <a href="project.html" class="login-btn">تسجيل الدخول</a>

        <div class="links">
            <a href="pro6.html">إنشاء حساب</a>
            <a href="pro4.html">دعم فني</a>
        </div>
    </div>

</body>
</html>
