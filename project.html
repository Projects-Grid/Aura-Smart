<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura | الواجهة الرئيسية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        /* 1. التأسيس والتنسيق العام */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #050505;
            color: white;
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 2. الخلفية المتموجة (The Aura Pulse) */
        .aura-pulse-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #0a0a0a 0%, #050505 100%);
            overflow: hidden;
        }

        .pulse-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 50%;
            animation: auraPulse 8s infinite linear;
        }

        @keyframes auraPulse {
            0% { width: 200px; height: 200px; opacity: 0.6; }
            100% { width: 1500px; height: 1500px; opacity: 0; }
        }

        /* 3. الشريط العلوي (Header) */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 50px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(99, 102, 241, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 2px;
            font-weight: bold;
            color: #fff;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .nav-links a {
            text-decoration: none;
            color: #94a3b8;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: #6366f1;
        }

        .profile-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(99, 102, 241, 0.1);
            padding: 8px 18px;
            border-radius: 50px;
            border: 1px solid rgba(99, 102, 241, 0.4);
            color: white !important;
            transition: 0.3s;
        }

        .profile-btn:hover {
            background: rgba(99, 102, 241, 0.2);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.3);
        }

        /* 4. محتوى الصفحة الرئيسي */
        main {
            max-width: 1100px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .welcome-text {
            text-align: center;
            margin-bottom: 50px;
        }

        .welcome-text h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .welcome-text span {
            color: #6366f1;
        }

        /* 5. شبكة الأيقونات (Grid) */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
        }

        .nav-card {
            text-decoration: none;
            color: inherit;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 35px;
            text-align: center;
            transition: all 0.4s ease;
            backdrop-filter: blur(5px);
        }

        .nav-card:hover {
            background: rgba(99, 102, 241, 0.08);
            border-color: #6366f1;
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .nav-card i {
            font-size: 45px;
            color: #6366f1;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .nav-card:hover i {
            text-shadow: 0 0 20px #6366f1;
        }

        .nav-card h3 {
            font-size: 1.3rem;
            margin-bottom: 10px;
        }

        .nav-card p {
            font-size: 0.9rem;
            color: #64748b;
        }

        /* التجاوب مع الجوال */
        @media (max-width: 768px) {
            header { padding: 15px 20px; }
            .nav-links a span { display: none; }
        }
    </style>
</head>
<body>

    <div class="aura-pulse-container">
        <div class="pulse-ring"></div>
        <div class="pulse-ring" style="animation-delay: -2s;"></div>
        <div class="pulse-ring" style="animation-delay: -4s;"></div>
    </div>

   <header style="display: flex; justify-content: space-between; align-items: center; padding: 15px 50px; background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(99, 102, 241, 0.1); position: sticky; top: 0; z-index: 100;">
    
    <div style="display: flex; align-items: center; gap: 12px; font-family: 'Orbitron', sans-serif; letter-spacing: 2px; font-weight: bold; color: #fff;">
        <i class="fas fa-ghost" style="color: #6366f1;"></i>
        AURA
    </div>
    
    <div style="display: flex; align-items: center; gap: 20px;">
        
        <a href="about.html" style="text-decoration: none; color: #94a3b8; font-size: 0.9rem; transition: 0.3s;" onmouseover="this.style.color='#6366f1'" onmouseout="this.style.color='#94a3b8'">
            <i class="fas fa-info-circle"></i> <span>عن النظام</span>
        </a>

        <a href="profile.html" style="text-decoration: none; display: flex; align-items: center; gap: 8px; background: rgba(99, 102, 241, 0.1); padding: 8px 15px; border-radius: 50px; border: 1px solid rgba(99, 102, 241, 0.4); color: white; transition: 0.3s;" onmouseover="this.style.boxShadow='0 0 15px rgba(99, 102, 241, 0.3)'" onmouseout="this.style.boxShadow='none'">
            <i class="fas fa-user-circle"></i>
            <span style="font-size: 0.85rem;">مستخدِم أورا</span>
        </a>

        <a href="login.html" title="تسجيل الخروج" style="text-decoration: none; color: #94a3b8; font-size: 1.2rem; transition: 0.3s; padding: 8px; border-radius: 50%; display: flex; align-items: center; justify-content: center;" onmouseover="this.style.color='#ff4757'; this.style.background='rgba(255, 71, 87, 0.1)'" onmouseout="this.style.color='#94a3b8'; this.style.background='transparent'">
            <i class="fas fa-sign-out-alt"></i>
        </a>

    </div>
</header>

    <main>
        <div class="welcome-text">
            <h1>مرحباً بك في عالم <span>AURA</span></h1>
            <p>اختر إحدى الأدوات الذكية للبدء في إدارة مشروعك</p>
        </div>

        <div class="grid-container">
            <a href="pro1.html" class="nav-card">
                <i class="fas fa-file-code"></i>
                <h3>ملف الكود</h3>
                <p>استعراض وتحليل الشفرة البرمجية للنظام</p>
            </a>

            <a href="pro2.html" class="nav-card">
                <i class="fas fa-chart-pie"></i>
                <h3>الإحصائيات</h3>
                <p>تحليل البيانات ومعدلات الأداء الحية</p>
            </a>

            <a href="pro3.html" class="nav-card">
                <i class="fas fa-sliders-h"></i>
                <h3>الإعدادات</h3>
                <p>تخصيص الواجهة والأنماط النيونية</p>
            </a>

            <a href="pro4.html" class="nav-card">
                <i class="fas fa-headset"></i>
                <h3>الدعم الفني</h3>
                <p>تواصل مع فريق التطوير للمساعدة</p>
            </a>
        </div>
    </main>

</body>
</html>
