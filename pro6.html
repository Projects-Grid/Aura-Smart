<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Aura | إنشاء حساب</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background: #050505; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .reg-card { width: 400px; background: rgba(255, 255, 255, 0.02); padding: 40px; border-radius: 30px; border: 1px solid #6366f1; text-align: center; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: white; text-align: center; }
        .btn { background: #6366f1; color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; cursor: pointer; text-decoration: none; display: block; font-weight: bold; }
        .back-link { display: block; margin-top: 20px; color: #888; text-decoration: none; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="reg-card">
        <i class="fas fa-user-plus" style="font-size: 40px; color: #6366f1; margin-bottom: 20px;"></i>
        <h2>انضم إلى أورا</h2>
        <p style="color: #666; font-size: 0.9rem; margin-bottom: 20px;">أنشئ حسابك الجديد في ثوانٍ</p>
        <input type="text" placeholder="الاسم الكامل">
        <input type="email" placeholder="البريد الإلكتروني">
        <input type="password" placeholder="كلمة المرور">
        <a href="login.html" class="btn">تأكيد التسجيل</a>
        <a href="login.html" class="back-link">لديك حساب بالفعل؟ سجل دخولك</a>
    </div>
</body>
</html>
