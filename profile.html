<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Aura | الملف الشخصي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background: #050505; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 40px; display: flex; justify-content: center; }
        .profile-card { width: 600px; background: rgba(255,255,255,0.02); border: 1px solid #6366f1; border-radius: 30px; padding: 50px; text-align: center; backdrop-filter: blur(20px); }
        .avatar-wrapper { width: 150px; height: 150px; border-radius: 50%; border: 3px solid #6366f1; margin: 0 auto 20px; position: relative; padding: 5px; box-shadow: 0 0 20px rgba(99, 102, 241, 0.5); }
        .avatar-wrapper img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .online-status { width: 20px; height: 20px; background: #22c55e; border: 3px solid #050505; border-radius: 50%; position: absolute; bottom: 10px; right: 10px; }
        h1 { margin: 10px 0; font-size: 2rem; }
        p.bio { color: #888; margin-bottom: 30px; }
        .user-stats { display: flex; justify-content: space-around; background: rgba(255,255,255,0.03); padding: 20px; border-radius: 20px; }
        .stat-item span { display: block; font-size: 0.8rem; color: #6366f1; }
        .stat-item strong { font-size: 1.2rem; }
        .back-btn { text-decoration: none; color: #6366f1; display: block; margin-bottom: 30px; text-align: right; }
    </style>
</head>
<body>
    <div class="profile-card">
        <a href="project.html" class="back-btn"><i class="fas fa-arrow-right"></i> العودة</a>
        <div class="avatar-wrapper">
            <img src="https://ui-avatars.com/api/?name=Aura+User&background=6366f1&color=fff" alt="User">
            <div class="online-status"></div>
        </div>
        <h1>مستخدم أورا</h1>
        <p class="bio">مهتم بتجربة المستخدم والذكاء الاصطناعي. "الجمال يكمن في التفاصيل التقنية".</p>
        <div class="user-stats">
            <div class="stat-item"><span>مستوى الطاقة</span><strong>92%</strong></div>
            <div class="stat-item"><span>المهام المكتملة</span><strong>14</strong></div>
            <div class="stat-item"><span>ساعات التركيز</span><strong>120h</strong></div>
        </div>
    </div>
</body>
</html>
