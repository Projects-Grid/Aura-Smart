<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Aura | الإحصائيات</title>
    <style>
        body { background: #050505; color: white; font-family: 'Segoe UI', sans-serif; padding: 40px; }
        .container { max-width: 800px; margin: auto; text-align: center; }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 40px; }
        .stat-card { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 20px; border: 1px solid #6366f1; }
        .bar-bg { background: #1e293b; height: 10px; border-radius: 5px; margin-top: 15px; overflow: hidden; }
        .bar-fill { background: #6366f1; height: 100%; width: 0; transition: 2s; }
        h2 { font-size: 3rem; margin: 0; color: #6366f1; }
    </style>
</head>
<body onload="document.querySelector('.bar-fill').style.width = '85%'">
    <div class="container">
        <a href="project.html" style="color: #6366f1; text-decoration: none;">← العودة</a>
        <h1>لوحة تحكم البيانات</h1>
        <div class="stats-grid">
            <div class="stat-card">
                <h3>تفاعل المستخدمين</h3>
                <h2>85%</h2>
                <div class="bar-bg"><div class="bar-fill"></div></div>
            </div>
            <div class="stat-card">
                <h3>سرعة الاستجابة</h3>
                <h2>0.02s</h2>
                <p>أداء فائق النعومة</p>
            </div>
        </div>
    </div>
</body>
</html>
