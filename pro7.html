<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Aura | الدعم الفني</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background: #050505; color: white; font-family: 'Segoe UI', sans-serif; padding: 50px; }
        .support-box { max-width: 500px; margin: auto; background: rgba(255,255,255,0.02); padding: 40px; border-radius: 25px; border: 1px solid rgba(99,102,241,0.3); }
        textarea, input { width: 100%; padding: 12px; margin-bottom: 20px; background: rgba(255,255,255,0.05); border: 1px solid #333; border-radius: 10px; color: white; }
        .send-btn { background: #6366f1; border: none; padding: 15px; width: 100%; color: white; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="support-box">
        <a href="project.html" style="color: #6366f1; text-decoration: none; font-size: 0.9rem;">← العودة</a>
        <h2 style="margin-top: 20px;">مركز المساعدة</h2>
        <p style="color: #888; margin-bottom: 30px;">أخبرنا كيف يمكننا تحسين تجربتك.</p>
        <input type="text" placeholder="الموضوع">
        <textarea rows="5" placeholder="اكتب رسالتك هنا..."></textarea>
        <button class="send-btn">إرسال الطلب</button>
    </div>
</body>
</html>
